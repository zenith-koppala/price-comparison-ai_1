<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PricePilot — Smart Price Comparison</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">◎</span>
    <span class="brand-name">Price<strong>Pilot</strong></span>
  </div>
  <div class="searchbar">
    <input id="searchInput" type="text" placeholder="Search products — e.g. headphones, monitor, watch..." />
  </div>
  <nav class="categories" id="categoryNav">
    <button class="cat-btn active" data-cat="All">All</button>
  </nav>
  <select class="sort-select" id="sortSelect">
    <option value="">Sort: Featured</option>
    <option value="price_asc">Price: Low to High</option>
    <option value="price_desc">Price: High to Low</option>
    <option value="rating">Highest Rated</option>
    <option value="discount">Biggest Discount</option>
  </select>
  <button class="watchlist-nav-btn" id="watchlistNavBtn">☆ Watchlist <span id="watchlistCount"></span></button>
</header>

<section class="stats-strip" id="statsStrip">
  <div class="stat"><span class="stat-num" id="statProducts">–</span><span class="stat-label">products tracked</span></div>
  <div class="stat"><span class="stat-num" id="statStores">5</span><span class="stat-label">stores compared</span></div>
  <div class="stat"><span class="stat-num">120</span><span class="stat-label">days of price history</span></div>
  <div class="stat"><span class="stat-num">ML</span><span class="stat-label">buy-now vs wait engine</span></div>
</section>

<main>
  <div class="grid" id="productGrid"></div>
</main>

<div class="compare-bar" id="compareBar">
  <span id="compareBarText">0 selected</span>
  <div class="compare-bar-actions">
    <button class="btn-secondary" id="compareBarBtn" disabled>Compare</button>
    <button class="compare-bar-clear" id="compareBarClear">Clear</button>
  </div>
</div>

<div class="drawer-backdrop" id="drawerBackdrop"></div>
<aside class="drawer" id="drawer">
  <button class="drawer-close" id="drawerClose">&times;</button>
  <div id="drawerContent"></div>
</aside>

<aside class="drawer" id="watchlistDrawer">
  <button class="drawer-close" id="watchlistClose">&times;</button>
  <h2>My Watchlist</h2>
  <p class="watchlist-sub">Products you're tracking. We'll flag it here (and email you, if you added one) when the price hits your target.</p>
  <div style="margin:14px 0">
    <button class="btn-secondary" id="checkAlertsBtn">Check for price drops now</button>
  </div>
  <div id="watchlistItems"></div>
</aside>

<div class="drawer-backdrop" id="compareBackdrop"></div>
<aside class="drawer compare-drawer" id="compareDrawer">
  <button class="drawer-close" id="compareClose">&times;</button>
  <h2>Compare Products</h2>
  <div id="compareContent"></div>
</aside>

<template id="cardTemplate">
  <article class="card" tabindex="0">
    <label class="card-compare">
      <input type="checkbox" class="card-compare-checkbox" />
      <span>Compare</span>
    </label>
    <div class="card-icon-tile">
      <div class="card-icon"></div>
    </div>
    <div class="card-cat"></div>
    <h3 class="card-title"></h3>
    <div class="card-rating">
      <span class="card-rating-stars"></span>
      <span class="card-rating-num"></span>
    </div>
    <div class="card-price-row">
      <span class="card-price"></span>
      <span class="card-mrp"></span>
      <span class="card-discount"></span>
    </div>
    <div class="card-store"></div>
    <svg class="sparkline" viewBox="0 0 100 28" preserveAspectRatio="none"></svg>
    <div class="card-badge"></div>
  </article>
</template>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
